<!DOCTYPE html>
<html>
    <head>
        <title>PDF-to-CBZ Converter</title>
        <meta name="description" content="Useful for Proton Drive!">
        <script>
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/sw.js");
            }
        </script>
        <script type="importmap">
            {
                "imports": {
                    "pdfjs-dist": "./node_modules/pdfjs-dist/build/pdf.mjs",
                    "jszip": "./node_modules/jszip/dist/jszip.min.js"
                }
            }
        </script>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width">
    </head>
    <body>
        <form>
            <label for="picker">Upload a PDF</label>
            <br>
            <input type="file" id="picker" accept="application/pdf">
            <br>
            <button id="btn" type="button" disabled>Download CBZ</button>
        </form>
        <script type="module" src="./script.js"></script>
    </body>
</html>
